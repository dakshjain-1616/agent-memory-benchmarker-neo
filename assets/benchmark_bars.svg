<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="680" fill="#0D1117"/>
  <rect x="10" y="10" width="1180" height="660" rx="12" fill="#161B22" stroke="#30363D" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#E6EDF3" font-size="20" font-weight="700">Accuracy by Backend &amp; Task Suite</text>
  <text x="600" y="72" text-anchor="middle" fill="#8B949E" font-size="13">Mock mode · Jaccard scoring · scores improve 15–25% with real LLM embeddings</text>

  <!-- Y-axis gridlines and labels -->
  <!-- Grid at 0.0 -->
  <line x1="140" y1="540" x2="1140" y2="540" stroke="#30363D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="128" y="544" text-anchor="end" fill="#8B949E" font-size="12">0.0</text>
  <!-- Grid at 0.2 -->
  <line x1="140" y1="460" x2="1140" y2="460" stroke="#30363D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="128" y="464" text-anchor="end" fill="#8B949E" font-size="12">0.2</text>
  <!-- Grid at 0.4 -->
  <line x1="140" y1="380" x2="1140" y2="380" stroke="#30363D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="128" y="384" text-anchor="end" fill="#8B949E" font-size="12">0.4</text>
  <!-- Grid at 0.6 -->
  <line x1="140" y1="300" x2="1140" y2="300" stroke="#30363D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="128" y="304" text-anchor="end" fill="#8B949E" font-size="12">0.6</text>
  <!-- Grid at 0.8 -->
  <line x1="140" y1="220" x2="1140" y2="220" stroke="#30363D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="128" y="224" text-anchor="end" fill="#8B949E" font-size="12">0.8</text>
  <!-- Grid at 1.0 -->
  <line x1="140" y1="140" x2="1140" y2="140" stroke="#30363D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="128" y="144" text-anchor="end" fill="#8B949E" font-size="12">1.0</text>

  <!-- Y axis -->
  <line x1="140" y1="130" x2="140" y2="545" stroke="#30363D" stroke-width="2"/>
  <!-- X axis -->
  <line x1="138" y1="540" x2="1145" y2="540" stroke="#30363D" stroke-width="2"/>

  <!-- Y-axis label -->
  <text x="30" y="345" text-anchor="middle" fill="#8B949E" font-size="13" transform="rotate(-90,30,345)">Accuracy Score (0–1)</text>

  <!-- === Group 1: Factual Recall === -->
  <text x="295" y="575" text-anchor="middle" fill="#E6EDF3" font-size="13" font-weight="600">Factual Recall</text>
  <!-- ChromaDB: 0.463 → height=185, y=540-185=355 -->
  <rect x="165" y="355" width="55" height="185" rx="4" fill="#7B61FF" opacity="0.85"/>
  <text x="192" y="348" text-anchor="middle" fill="#7B61FF" font-size="11" font-weight="700">0.463</text>
  <!-- FAISS: 0.451 → h=180 -->
  <rect x="225" y="360" width="55" height="180" rx="4" fill="#00C2FF" opacity="0.85"/>
  <text x="252" y="353" text-anchor="middle" fill="#00C2FF" font-size="11" font-weight="700">0.451</text>
  <!-- SQLite: 0.491 → h=196 -->
  <rect x="285" y="344" width="55" height="196" rx="4" fill="#00E5A0" opacity="0.85"/>
  <text x="312" y="337" text-anchor="middle" fill="#00E5A0" font-size="11" font-weight="700">0.491</text>
  <!-- Mem0: 0.000 (tiny placeholder) -->
  <rect x="345" y="536" width="55" height="4" rx="2" fill="#FF9500" opacity="0.5"/>
  <text x="372" y="530" text-anchor="middle" fill="#FF9500" font-size="10">N/A</text>

  <!-- === Group 2: Temporal Ordering === -->
  <text x="545" y="575" text-anchor="middle" fill="#E6EDF3" font-size="13" font-weight="600">Temporal Ordering</text>
  <!-- ChromaDB: 0.381 → h=152 -->
  <rect x="415" y="388" width="55" height="152" rx="4" fill="#7B61FF" opacity="0.85"/>
  <text x="442" y="381" text-anchor="middle" fill="#7B61FF" font-size="11" font-weight="700">0.381</text>
  <!-- FAISS: 0.368 → h=147 -->
  <rect x="475" y="393" width="55" height="147" rx="4" fill="#00C2FF" opacity="0.85"/>
  <text x="502" y="386" text-anchor="middle" fill="#00C2FF" font-size="11" font-weight="700">0.368</text>
  <!-- SQLite: 0.401 → h=160 -->
  <rect x="535" y="380" width="55" height="160" rx="4" fill="#00E5A0" opacity="0.85"/>
  <text x="562" y="373" text-anchor="middle" fill="#00E5A0" font-size="11" font-weight="700">0.401</text>
  <!-- Mem0 -->
  <rect x="595" y="536" width="55" height="4" rx="2" fill="#FF9500" opacity="0.5"/>
  <text x="622" y="530" text-anchor="middle" fill="#FF9500" font-size="10">N/A</text>

  <!-- === Group 3: Entity Tracking === -->
  <text x="795" y="575" text-anchor="middle" fill="#E6EDF3" font-size="13" font-weight="600">Entity Tracking</text>
  <!-- ChromaDB: 0.412 → h=165 -->
  <rect x="665" y="375" width="55" height="165" rx="4" fill="#7B61FF" opacity="0.85"/>
  <text x="692" y="368" text-anchor="middle" fill="#7B61FF" font-size="11" font-weight="700">0.412</text>
  <!-- FAISS: 0.394 → h=158 -->
  <rect x="725" y="382" width="55" height="158" rx="4" fill="#00C2FF" opacity="0.85"/>
  <text x="752" y="375" text-anchor="middle" fill="#00C2FF" font-size="11" font-weight="700">0.394</text>
  <!-- SQLite: 0.437 → h=175 -->
  <rect x="785" y="365" width="55" height="175" rx="4" fill="#00E5A0" opacity="0.85"/>
  <text x="812" y="358" text-anchor="middle" fill="#00E5A0" font-size="11" font-weight="700">0.437</text>
  <!-- Mem0 -->
  <rect x="845" y="536" width="55" height="4" rx="2" fill="#FF9500" opacity="0.5"/>
  <text x="872" y="530" text-anchor="middle" fill="#FF9500" font-size="10">N/A</text>

  <!-- === Group 4: Contradiction Detection === -->
  <text x="1045" y="575" text-anchor="middle" fill="#E6EDF3" font-size="13" font-weight="600">Contradiction Detection</text>
  <!-- ChromaDB: 0.334 → h=134 -->
  <rect x="915" y="406" width="55" height="134" rx="4" fill="#7B61FF" opacity="0.85"/>
  <text x="942" y="399" text-anchor="middle" fill="#7B61FF" font-size="11" font-weight="700">0.334</text>
  <!-- FAISS: 0.311 → h=124 -->
  <rect x="975" y="416" width="55" height="124" rx="4" fill="#00C2FF" opacity="0.85"/>
  <text x="1002" y="409" text-anchor="middle" fill="#00C2FF" font-size="11" font-weight="700">0.311</text>
  <!-- SQLite: 0.358 → h=143 -->
  <rect x="1035" y="397" width="55" height="143" rx="4" fill="#00E5A0" opacity="0.85"/>
  <text x="1062" y="390" text-anchor="middle" fill="#00E5A0" font-size="11" font-weight="700">0.358</text>
  <!-- Mem0 -->
  <rect x="1095" y="536" width="55" height="4" rx="2" fill="#FF9500" opacity="0.5"/>
  <text x="1122" y="530" text-anchor="middle" fill="#FF9500" font-size="10">N/A</text>

  <!-- Legend -->
  <rect x="200" y="610" width="14" height="14" rx="3" fill="#7B61FF"/>
  <text x="220" y="622" fill="#7B61FF" font-size="13">ChromaDB</text>
  <rect x="320" y="610" width="14" height="14" rx="3" fill="#00C2FF"/>
  <text x="340" y="622" fill="#00C2FF" font-size="13">FAISS</text>
  <rect x="420" y="610" width="14" height="14" rx="3" fill="#00E5A0"/>
  <text x="440" y="622" fill="#00E5A0" font-size="13">SQLite ✅ Winner</text>
  <rect x="570" y="610" width="14" height="14" rx="3" fill="#FF9500"/>
  <text x="590" y="622" fill="#FF9500" font-size="13">Mem0 (needs API key)</text>

  <!-- Baseline annotation -->
  <line x1="140" y1="380" x2="1140" y2="380" stroke="#30363D" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="1145" y="384" fill="#8B949E" font-size="11">0.4 baseline</text>
</svg>
