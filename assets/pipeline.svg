<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" width="1400" height="600" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9B81FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20D2FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00C2FF" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20F5B0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00E5A0" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFAF30" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF9500" stop-opacity="0.1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B949E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="600" fill="#0D1117"/>

  <!-- Title -->
  <text x="700" y="55" text-anchor="middle" fill="#E6EDF3" font-size="22" font-weight="700" letter-spacing="1">How Agent Memory Benchmarker Works</text>

  <!-- Boxes -->
  <!-- Task Suites -->
  <rect x="50" y="160" width="200" height="130" rx="12" fill="url(#purpleGrad)" stroke="#7B61FF" stroke-width="2"/>
  <text x="150" y="215" text-anchor="middle" fill="#7B61FF" font-size="15" font-weight="700">Task Suites</text>
  <text x="150" y="238" text-anchor="middle" fill="#E6EDF3" font-size="12">7 memory scenarios</text>
  <text x="150" y="256" text-anchor="middle" fill="#8B949E" font-size="11">Factual · Temporal</text>
  <text x="150" y="272" text-anchor="middle" fill="#8B949E" font-size="11">Entity · Contradiction…</text>

  <!-- Arrow 1 -->
  <line x1="252" y1="225" x2="305" y2="225" stroke="#8B949E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Memory Backend -->
  <rect x="308" y="160" width="200" height="130" rx="12" fill="url(#blueGrad)" stroke="#00C2FF" stroke-width="2"/>
  <text x="408" y="215" text-anchor="middle" fill="#00C2FF" font-size="15" font-weight="700">Memory Backend</text>
  <text x="408" y="238" text-anchor="middle" fill="#E6EDF3" font-size="12">4 adapters</text>
  <text x="408" y="256" text-anchor="middle" fill="#8B949E" font-size="11">ChromaDB · FAISS</text>
  <text x="408" y="272" text-anchor="middle" fill="#8B949E" font-size="11">Mem0 · SQLite</text>

  <!-- Arrow 2 -->
  <line x1="510" y1="225" x2="563" y2="225" stroke="#8B949E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Benchmark Runner -->
  <rect x="566" y="160" width="200" height="130" rx="12" fill="url(#greenGrad)" stroke="#00E5A0" stroke-width="2"/>
  <text x="666" y="208" text-anchor="middle" fill="#00E5A0" font-size="15" font-weight="700">Benchmark</text>
  <text x="666" y="228" text-anchor="middle" fill="#00E5A0" font-size="15" font-weight="700">Runner</text>
  <text x="666" y="252" text-anchor="middle" fill="#8B949E" font-size="11">Loads memories</text>
  <text x="666" y="268" text-anchor="middle" fill="#8B949E" font-size="11">Issues queries</text>

  <!-- Arrow 3 -->
  <line x1="768" y1="225" x2="821" y2="225" stroke="#8B949E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Scorer -->
  <rect x="824" y="160" width="200" height="130" rx="12" fill="url(#orangeGrad)" stroke="#FF9500" stroke-width="2"/>
  <text x="924" y="215" text-anchor="middle" fill="#FF9500" font-size="15" font-weight="700">Scorer</text>
  <text x="924" y="238" text-anchor="middle" fill="#E6EDF3" font-size="12">Hybrid scoring</text>
  <text x="924" y="256" text-anchor="middle" fill="#8B949E" font-size="11">40% exact-match</text>
  <text x="924" y="272" text-anchor="middle" fill="#8B949E" font-size="11">60% semantic sim.</text>

  <!-- Arrow 4 -->
  <line x1="1026" y1="225" x2="1079" y2="225" stroke="#8B949E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Reporter -->
  <rect x="1082" y="160" width="200" height="130" rx="12" fill="url(#purpleGrad)" stroke="#7B61FF" stroke-width="2"/>
  <text x="1182" y="215" text-anchor="middle" fill="#7B61FF" font-size="15" font-weight="700">Reporter</text>
  <text x="1182" y="238" text-anchor="middle" fill="#E6EDF3" font-size="12">Charts + PDF</text>
  <text x="1182" y="256" text-anchor="middle" fill="#8B949E" font-size="11">Leaderboard</text>
  <text x="1182" y="272" text-anchor="middle" fill="#8B949E" font-size="11">CSV + SQLite DB</text>

  <!-- Metric badges -->
  <text x="700" y="370" text-anchor="middle" fill="#8B949E" font-size="13">5 metrics captured per backend × task combination</text>

  <!-- Badge: Accuracy -->
  <rect x="100" y="400" width="190" height="55" rx="8" fill="#0D1117" stroke="#00E5A0" stroke-width="1.5"/>
  <text x="195" y="425" text-anchor="middle" fill="#00E5A0" font-size="13" font-weight="700">Accuracy</text>
  <text x="195" y="444" text-anchor="middle" fill="#8B949E" font-size="11">Exact + Semantic blend</text>

  <!-- Badge: Latency -->
  <rect x="310" y="400" width="190" height="55" rx="8" fill="#0D1117" stroke="#00C2FF" stroke-width="1.5"/>
  <text x="405" y="425" text-anchor="middle" fill="#00C2FF" font-size="13" font-weight="700">Latency</text>
  <text x="405" y="444" text-anchor="middle" fill="#8B949E" font-size="11">Per-query ms</text>

  <!-- Badge: Confidence -->
  <rect x="520" y="400" width="190" height="55" rx="8" fill="#0D1117" stroke="#FF9500" stroke-width="1.5"/>
  <text x="615" y="425" text-anchor="middle" fill="#FF9500" font-size="13" font-weight="700">Confidence</text>
  <text x="615" y="444" text-anchor="middle" fill="#8B949E" font-size="11">Retrieval score</text>

  <!-- Badge: Staleness -->
  <rect x="730" y="400" width="190" height="55" rx="8" fill="#0D1117" stroke="#FF4C4C" stroke-width="1.5"/>
  <text x="825" y="425" text-anchor="middle" fill="#FF4C4C" font-size="13" font-weight="700">Staleness</text>
  <text x="825" y="444" text-anchor="middle" fill="#8B949E" font-size="11">Memory decay (exp.)</text>

  <!-- Badge: Tokens -->
  <rect x="940" y="400" width="190" height="55" rx="8" fill="#0D1117" stroke="#FFD60A" stroke-width="1.5"/>
  <text x="1035" y="425" text-anchor="middle" fill="#FFD60A" font-size="13" font-weight="700">Tokens</text>
  <text x="1035" y="444" text-anchor="middle" fill="#8B949E" font-size="11">LLM cost tracking</text>

  <!-- ResultCollector box -->
  <rect x="1150" y="400" width="200" height="55" rx="8" fill="#0D1117" stroke="#30363D" stroke-width="1.5"/>
  <text x="1250" y="425" text-anchor="middle" fill="#8B949E" font-size="13" font-weight="700">ResultCollector</text>
  <text x="1250" y="444" text-anchor="middle" fill="#8B949E" font-size="11">SQLite persistence</text>

  <!-- Bottom note -->
  <text x="700" y="545" text-anchor="middle" fill="#8B949E" font-size="12" font-style="italic">Mock mode: no API keys needed · Deterministic Jaccard scoring · Runs in &lt;10 seconds</text>
</svg>
